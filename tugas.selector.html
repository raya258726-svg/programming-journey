<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas selector CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- selector tag -->
   <p>Ini adalah paragraf dalam halaman selektor.</p>
  <!-- Selector class -->
   <div class="biru">Ini adalah div dengan class biru</div>
  <!-- selector id -->
   <div id="hijau">Ini adalah div dengan id hijau</div>
  <!-- selector atribut -->
   <input type="text" placeholder="Masukkan teks disini">
  <!-- selector universal -->
   <p>Paragraf ini menggunakan selector universal.</p>
</body>
</html>
