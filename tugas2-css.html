<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas internal CSS</title>
  <style>
    h1 {
      font-family: Arial;
      color: #800;
      font-size: 55px;
      text-align: center;
    }
    h2 {
      font-family: 'Times New Roman';
      color: #ff0000;
      font-size: 40px;
      text-align: left;
    }
    p {
      font-family: Verdana;
      color: #3000;
      font-size: 30px;
      text-align: justify;
    }
  </style>
</head>
<body>
  <h1>JUDUL HALAMAN INI</h1>
  <h2>JUDUL KEDUA</h2>
  <p>Ini adalah sebuah paragraf dengan gaya CSS internal yang diterapkan.</p>
</body>
</html>
