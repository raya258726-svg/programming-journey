<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praktik Border 1</title>
  <style>
    .solid {
      background-color: pink;
      border: 3px solid blue;
      padding: 10px;
    }

    .dotted {
      background-color: aquamarine;
      border: 3px dotted red;
      padding: 10px;
    }

    .double {
      background-color: bisque;
      border: 5px double green;
      padding: 10px;
    }

    .dashed {
      background-color:blueviolet;
      border: 3px dashed yellow;
      padding: 10px;
    }

    .groove {
      background-color: olive;
      border: 3px groove purple;
      padding: 10px;
    }

    .ridge {
      background-color: brown;
      border: 3px ridge orange;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h2>Contoh broder CSS</h2>
  <p class="solid">Ini border solid</p>
  <p class="dotted">Ini border dotted</p>
  <p class="double">Ini broder double</p>
  <p class="dashed">Ini broder dashed</p>
  <p class="groove">Ini broder groove</p>
  <p class="ridge">Ini broder ridge</p>
</body>
</html>
