<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selector dalam HTML</title>
  <style>
    /* SElektor Tag */
    p {
      color: blue;
    }
    /* Selektor ID */
    #unique-section {
      border: 2px solid red;
      padding: 10px;
    }
    /* Selektor Atribut */
    a[href] {
      text-decoration: none;
      color: green;
    }
    /* Selektor Universal */
    * {
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Contoh Penggunaan Selektor dalam HTML</h1>
  <!-- Selektor Tag -->
   <p>Ini adalah paragraf yang menggunakan selektor tag &lt;p&gt;.</p>
   <!-- Selektor Kelas -->
    <div class="highlight">
      <p>Ini adalah paragraf dengan kelas "highlight".</p>
    </div>
    <!-- Selektor ID -->
    <div id="unique-section">
      <p>Ini adalah paragraf dalam div dengan ID "unique-section.</p>
    </div>
    <!-- Selector Atribut -->
     <a href="https://www.example.com" target="_blank">Link dengan atribut href</a>
     <!-- Selector Universal -->
      <p>Paragraf ini menggunakan selektor universal.</p>
</body>
</html>
