<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tugas Text Alignmnet</title>
  <style>
    header {
      text-align: center;
    }
    .text-left {
      text-align: left;
    }
    .text-left {
      text-align: left;
    }
    .text-center {
      text-align: center;
    }
    .text-center {
      text-align: center;
    }
    .text-right {
      text-align: right;
    }
    .text-right {
      text-align: right;
    }
    .text-justify {
      text-align: justify;
    }
  </style>
</head>
<body>
  <header> Puisi Kelinci </header>
  <div class="text-left">Binatang kecil yang menggemaskan.</div>
  <div class="text-left">Membuat semua orang suka padanya.</div>
  <div class="text-center">Giginya yang lucu.</div>
  <div class="text-center">Bulunya yang halus dan suka meloncat.</div>
  <div class="text-right">Ingin selalu kupelihara kelinci</div>
  <div class="text-right">Dan memeluknya setiap hari</div>
  <div class="text-justify">Karya Bening Tirtasari</div>
</body>
</html>
