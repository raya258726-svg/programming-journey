<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Membuat empat kotak</title>
  <style>
    .solid {
      border: 5px solid black;
      padding: 12px;
      margin: 12px;
    }
    .double {
      border: 10px double blue;
      padding: 12px;
      margin: 12px;
    }
    .groove {
      border: 10px groove green;
      padding: 12px;
      margin: 12px;
    }
    .ridge {
      border: 5px ridge red;
      padding: 12px;
      margin: 12px;
    }
  </style>
</head>
<body>
  <div class="solid">Border solid warna hitam</div>
  <div class="double">Border double warna biru</div>
  <div class="groove">Border groove warna hijau</div>
  <div class="ridge">Border ridge warna merah</div>
</body>
</html>
