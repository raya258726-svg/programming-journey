<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>layout sederhana</title>
  <style>
    body {
      margin: 0;
    }
    .header {
      width: 100%;
      height: 100px;
      background-color: lightsalmon;
    }
    .content {
      width: 100%;
      height: 300px;
      background-color: lightseagreen;
    }
    .footer {
      width: 100%;
      height: 80px;
      background-color: lightgoldenrodyellow;
    }
  </style>
</head>
<body>
  <div class="header">
    Header dengan lebar 100% dan tingggi 100px
  </div>
  
  <div class="content">
    Content dengan lebar 100% dan tinggi 300px
  </div>
  
  <div class="footer">
    Footer dengan lebar 100% dan tinggi 80px
  </div>
  
</body>
</html>
