<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>latihan tugas box</title>
  <style>
    .box1 {
      width: 200px;
      height: 200px;
      background-color: lightpink;
    }
    .box2 {
      width: 50%;
      height: 150px;
      background-color: lightskyblue;
    }
    .box3 {
      width: 80vw;
      height: 30vh;
      background-color: lightgray;
    }
  </style>

</head>
<body>
  <div class="box1">
    Lebar 200px dan tinggi 200px
  </div>

  <div class="box2">
    Lebar 50% dan tinggi 150px
  </div>

  <div class="box3">
    Lebar 80vw dan tinggi 30vh
  </div>
</body>
</html>
